version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # Build up to the final optimized runtime stage
      target: runtime
    
    container_name: research-assistant-backend
    
    ports:
      - "8000:8000"
    
    env_file:
      # Inject environment variables from backend/.env into the container
      - ./backend/.env
    
    environment:
      - PYTHONUNBUFFERED=1
    
    healthcheck:
      # Use curl installed in runtime stage to verify endpoint is up and responding
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    restart: unless-stopped
    
    volumes:
      # Mount font assets directory read-only so local changes don't require full rebuilds
      - ./backend/assets:/app/assets:ro
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
